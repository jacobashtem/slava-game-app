<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" fill="none">
  <defs>
    <radialGradient id="wBg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#0a0612"/>
    </radialGradient>
    <radialGradient id="wGlow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="wSnake" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
  </defs>
  <rect width="200" height="260" rx="12" fill="url(#wBg)"/>
  <rect width="200" height="260" rx="12" fill="url(#wGlow)"/>
  <!-- Runic border -->
  <rect x="6" y="6" width="188" height="248" rx="9" stroke="#a78bfa" stroke-opacity="0.15" stroke-width="1" fill="none"/>
  <rect x="10" y="10" width="180" height="240" rx="7" stroke="#a78bfa" stroke-opacity="0.08" stroke-width="0.5" fill="none"/>
  <!-- Skull -->
  <g transform="translate(100,105)" fill="#a78bfa" opacity="0.85">
    <ellipse cx="0" cy="-10" rx="32" ry="38" fill="#a78bfa" opacity="0.12"/>
    <ellipse cx="0" cy="-10" rx="28" ry="34" stroke="#a78bfa" stroke-width="2" fill="none" opacity="0.6"/>
    <!-- Eye sockets -->
    <ellipse cx="-10" cy="-18" rx="7" ry="8" fill="#0a0612"/>
    <ellipse cx="10" cy="-18" rx="7" ry="8" fill="#0a0612"/>
    <!-- Eye glow -->
    <circle cx="-10" cy="-17" r="3" fill="#a78bfa" opacity="0.7"/>
    <circle cx="10" cy="-17" r="3" fill="#a78bfa" opacity="0.7"/>
    <!-- Nose -->
    <path d="M-3,0 L0,5 L3,0" stroke="#a78bfa" stroke-width="1.5" fill="none" opacity="0.4"/>
    <!-- Jaw -->
    <path d="M-18,8 Q-15,22 0,25 Q15,22 18,8" stroke="#a78bfa" stroke-width="1.5" fill="none" opacity="0.35"/>
    <!-- Teeth -->
    <line x1="-8" y1="10" x2="-8" y2="15" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
    <line x1="-3" y1="11" x2="-3" y2="17" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
    <line x1="3" y1="11" x2="3" y2="17" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
    <line x1="8" y1="10" x2="8" y2="15" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
  </g>
  <!-- Serpents -->
  <g stroke="url(#wSnake)" stroke-width="2.5" fill="none" opacity="0.5">
    <path d="M40,160 Q30,140 45,125 Q60,110 50,90 Q42,75 55,65"/>
    <path d="M160,160 Q170,140 155,125 Q140,110 150,90 Q158,75 145,65"/>
  </g>
  <!-- Particles -->
  <circle cx="60" cy="50" r="1.5" fill="#a78bfa" opacity="0.4"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="140" cy="60" r="1" fill="#c4b5fd" opacity="0.3"><animate attributeName="opacity" values="0.1;0.4;0.1" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="85" cy="170" r="1.2" fill="#a78bfa" opacity="0.3"><animate attributeName="opacity" values="0.2;0.5;0.2" dur="2.5s" repeatCount="indefinite"/></circle>
  <!-- Name -->
  <text x="100" y="215" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#a78bfa" opacity="0.9">WELES</text>
  <text x="100" y="235" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#a78bfa" opacity="0.4">Pan Zaswiatow</text>
  <!-- Bottom ornament -->
  <line x1="50" y1="245" x2="150" y2="245" stroke="#a78bfa" stroke-opacity="0.15" stroke-width="0.5"/>
</svg>
