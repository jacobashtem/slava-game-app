<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" fill="none">
  <defs>
    <radialGradient id="sBg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#451a03"/>
      <stop offset="100%" stop-color="#0c0804"/>
    </radialGradient>
    <radialGradient id="sGlow" cx="50%" cy="40%" r="35%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="200" height="260" rx="12" fill="url(#sBg)"/>
  <rect width="200" height="260" rx="12" fill="url(#sGlow)"/>
  <rect x="6" y="6" width="188" height="248" rx="9" stroke="#f97316" stroke-opacity="0.15" stroke-width="1" fill="none"/>
  <!-- Fire circle -->
  <circle cx="100" cy="95" r="40" stroke="#f97316" stroke-width="2" fill="none" opacity="0.3"/>
  <circle cx="100" cy="95" r="32" stroke="#fb923c" stroke-width="1" fill="none" opacity="0.2"/>
  <!-- Sun/fire symbol -->
  <g transform="translate(100,95)" fill="#f97316">
    <circle r="18" fill="#f97316" opacity="0.15"/>
    <circle r="12" stroke="#f97316" stroke-width="2" fill="none" opacity="0.7"/>
    <!-- Rays -->
    <g stroke="#f97316" stroke-width="2" opacity="0.6">
      <line x1="0" y1="-16" x2="0" y2="-28"/>
      <line x1="0" y1="16" x2="0" y2="28"/>
      <line x1="-16" y1="0" x2="-28" y2="0"/>
      <line x1="16" y1="0" x2="28" y2="0"/>
      <line x1="-11" y1="-11" x2="-20" y2="-20"/>
      <line x1="11" y1="-11" x2="20" y2="-20"/>
      <line x1="-11" y1="11" x2="-20" y2="20"/>
      <line x1="11" y1="11" x2="20" y2="20"/>
    </g>
    <!-- Inner fire -->
    <circle r="5" fill="#fbbf24" opacity="0.6"/>
    <circle r="3" fill="#fef3c7" opacity="0.4"/>
  </g>
  <!-- Flames -->
  <g opacity="0.5">
    <path d="M70,155 Q65,135 75,120 Q80,110 72,100" stroke="#f97316" stroke-width="2" fill="none">
      <animate attributeName="d" values="M70,155 Q65,135 75,120 Q80,110 72,100;M70,155 Q63,132 73,118 Q82,108 74,98;M70,155 Q65,135 75,120 Q80,110 72,100" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M130,155 Q135,135 125,120 Q120,110 128,100" stroke="#fb923c" stroke-width="2" fill="none">
      <animate attributeName="d" values="M130,155 Q135,135 125,120 Q120,110 128,100;M130,155 Q137,132 127,118 Q118,108 126,98;M130,155 Q135,135 125,120 Q120,110 128,100" dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>
  <!-- Embers -->
  <circle cx="80" cy="60" r="1.5" fill="#fb923c" opacity="0.5"><animate attributeName="cy" values="60;45;60" dur="3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;0.1;0.5" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="120" cy="55" r="1" fill="#fbbf24" opacity="0.4"><animate attributeName="cy" values="55;38;55" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="100" cy="50" r="1.2" fill="#f97316" opacity="0.3"><animate attributeName="cy" values="50;30;50" dur="3.5s" repeatCount="indefinite"/></circle>
  <text x="100" y="215" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#f97316" opacity="0.9">SWAROZYC</text>
  <text x="100" y="235" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#f97316" opacity="0.4">Bog Ognia</text>
  <line x1="50" y1="245" x2="150" y2="245" stroke="#f97316" stroke-opacity="0.15" stroke-width="0.5"/>
</svg>
