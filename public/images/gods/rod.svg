<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" fill="none">
  <defs>
    <radialGradient id="rBg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1e1b2e"/>
      <stop offset="100%" stop-color="#08060e"/>
    </radialGradient>
    <radialGradient id="rGlow" cx="50%" cy="42%" r="35%">
      <stop offset="0%" stop-color="#e2e8f0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="200" height="260" rx="12" fill="url(#rBg)"/>
  <rect width="200" height="260" rx="12" fill="url(#rGlow)"/>
  <rect x="6" y="6" width="188" height="248" rx="9" stroke="#e2e8f0" stroke-opacity="0.12" stroke-width="1" fill="none"/>
  <!-- Tree of life / World tree -->
  <g transform="translate(100,100)" stroke="#e2e8f0" fill="none">
    <!-- Trunk -->
    <line x1="0" y1="-5" x2="0" y2="60" stroke-width="3" opacity="0.4"/>
    <!-- Roots -->
    <g stroke-width="1.5" opacity="0.3">
      <path d="M0,60 Q-15,70 -25,80"/>
      <path d="M0,60 Q15,70 25,80"/>
      <path d="M0,55 Q-10,65 -18,75"/>
      <path d="M0,55 Q10,65 18,75"/>
    </g>
    <!-- Branches -->
    <g stroke-width="1.5" opacity="0.4">
      <path d="M0,-5 Q-20,-15 -35,-30"/>
      <path d="M0,-5 Q20,-15 35,-30"/>
      <path d="M0,-15 Q-15,-25 -25,-40"/>
      <path d="M0,-15 Q15,-25 25,-40"/>
      <path d="M0,-25 Q-10,-35 -18,-48"/>
      <path d="M0,-25 Q10,-35 18,-48"/>
    </g>
    <!-- Crown (canopy) -->
    <circle r="45" cy="-30" stroke-width="1" opacity="0.12" fill="#e2e8f0" fill-opacity="0.03"/>
    <!-- Leaves / dots -->
    <g fill="#e2e8f0" opacity="0.3">
      <circle cx="-35" cy="-30" r="2"/>
      <circle cx="35" cy="-30" r="2"/>
      <circle cx="-25" cy="-40" r="1.5"/>
      <circle cx="25" cy="-40" r="1.5"/>
      <circle cx="-18" cy="-48" r="1.5"/>
      <circle cx="18" cy="-48" r="1.5"/>
      <circle cx="0" cy="-55" r="2"/>
      <circle cx="-10" cy="-52" r="1"/>
      <circle cx="10" cy="-52" r="1"/>
    </g>
  </g>
  <!-- Ancestor spirits / small circles -->
  <g fill="#e2e8f0" opacity="0.2">
    <circle cx="55" cy="70" r="5" stroke="#e2e8f0" stroke-width="0.5"/>
    <circle cx="145" cy="70" r="5" stroke="#e2e8f0" stroke-width="0.5"/>
    <circle cx="45" cy="90" r="4" stroke="#e2e8f0" stroke-width="0.5"/>
    <circle cx="155" cy="90" r="4" stroke="#e2e8f0" stroke-width="0.5"/>
  </g>
  <!-- Light particles -->
  <circle cx="80" cy="50" r="1.5" fill="#e2e8f0" opacity="0.3"><animate attributeName="opacity" values="0.1;0.4;0.1" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="120" cy="55" r="1" fill="#cbd5e1" opacity="0.25"><animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="100" cy="42" r="1.2" fill="#f1f5f9" opacity="0.3"><animate attributeName="opacity" values="0.2;0.5;0.2" dur="2.5s" repeatCount="indefinite"/></circle>
  <text x="100" y="215" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#e2e8f0" opacity="0.85">ROD</text>
  <text x="100" y="235" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#e2e8f0" opacity="0.35">Praojciec Bogow</text>
  <line x1="50" y1="245" x2="150" y2="245" stroke="#e2e8f0" stroke-opacity="0.12" stroke-width="0.5"/>
</svg>
